name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: fmt check
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: lint
        run: |
          set -euo pipefail
          # golangci-lint-action's bundled binary lags the Go toolchain
          # (it refuses to lint code targeting a newer `go` directive than
          # it was itself built with). Install straight from source with the
          # same toolchain CI already set up, matching local dev.
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run --disable errcheck,staticcheck

      - name: test
        run: go test -race ./...

      - name: build
        run: go build -buildvcs=false ./...
