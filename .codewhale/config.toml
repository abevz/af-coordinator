# af-coordinator project overlay.
#
# Project-overlay keys are intentionally limited to model, reasoning_effort,
# approval_policy, sandbox_mode, allow_shell, max_subagents, and notes_path.
# In particular, project-level `instructions` is ignored by the runtime;
# AGENTS.md is loaded automatically.
#
# Worktree behavior is not a config-level setting. AGENTS.md defines the policy,
# and hooks.toml rejects invalid sub-agent spawns and direct writes from main/
# in the interactive TUI. CodeWhale 0.8.66 headless `exec` bypasses hooks.

reasoning_effort = "high"
max_subagents = 8
